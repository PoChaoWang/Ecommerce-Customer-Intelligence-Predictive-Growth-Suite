# deploy/k8s/kafka.yaml
# 使用 Strimzi Operator 管理的 Kafka 自訂資源 (v1 版，採 KRaft + NodePool 架構)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-node-pool
  labels:
    strimzi.io/cluster: ecommerce-kafka
  namespace: default
spec:
  replicas: 1 # 本地測試使用 1 個節點即可，節省記憶體
  roles:
    - controller # KRaft 控制器角色 (取代 Zookeeper)
    - broker     # 訊息 Broker 角色
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: ecommerce-kafka
  namespace: default
  annotations:
    strimzi.io/kraft: "enabled"
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.3.0
    metadataVersion: 4.3-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal # 供 K8s 內部服務連線 (如 Spark Consumer, Producer)
        tls: false
      - name: external
        port: 9094
        type: nodeport # 使用 NodePort 避免本地 Docker Desktop LoadBalancer 卡在 pending
        tls: false
        configuration:
          bootstrap:
            nodePort: 30094
          brokers:
            - broker: 0
              nodePort: 30095
              advertisedHost: localhost # 強制公告連線位置為 localhost，避免客戶端嘗試連線 K8s 內部不可路由的 IP
  entityOperator: # 自動協助我們建立與維護 Topic 的 Operator
    topicOperator: {}
    userOperator: {}
---
# 宣告 K8s Kafka 自動建立的 Topics
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: orders-topic
  labels:
    strimzi.io/cluster: ecommerce-kafka
  namespace: default
spec:
  partitions: 3
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: behavior-topic
  labels:
    strimzi.io/cluster: ecommerce-kafka
  namespace: default
spec:
  partitions: 3
  replicas: 1
