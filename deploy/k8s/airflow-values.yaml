# deploy/k8s/airflow-values.yaml
# 官方 Apache Airflow Helm Chart 的自訂設定檔 (Values)

# 1. 執行器設定：採用 KubernetesExecutor，將每個 Airflow Task 動態開成一個獨立的 Pod 執行
# 執行完自動關閉 Pod，資源利用率最高，最適合 K8s 環境
executor: "KubernetesExecutor"

# 2. 資料庫設定：連線到我們在 K8s 內部自行建立的 Postgres 服務
data:
  metadataConnection:
    user: "airflow"
    pass: "airflow_password"
    host: "postgres-service"
    port: 5432
    db: "airflow"
    sslmode: "disable"

# 3. 停用 Helm Chart 內建的 Postgres，改用我們在 postgres.yaml 中建立的 Postgres
postgresql:
  enabled: false

# 4. DAG 部署方式：採用 git-sync，每 60 秒自動從 GitHub 儲存庫同步 DAG 程式碼
# 這樣修改 DAG 時，不需要重新打包 Airflow 映像檔，直接 push git 即可生效
dags:
  gitSync:
    enabled: true
    repo: "https://github.com/PoChaoWang/Ecommerce-Customer-Intelligence-Predictive-Growth-Suite.git"
    branch: "main"
    subPath: "airflow/dags"
    interval: 60

# 5. Webserver 與 Scheduler Pod 內部的環境變數設定
env:
  - name: "AIRFLOW__CORE__LOAD_EXAMPLES"
    value: "False"
  - name: "AIRFLOW__CORE__TIMEZONE"
    value: "Asia/Taipei"
  - name: "AIRFLOW__CORE__DEFAULT_TIMEZONE"
    value: "Asia/Taipei"
  - name: "DBT_PROJECT"
    value: "my-project-for-bigquery-445809"
