            dimension:
              label: "Product B Category"
              type: string

      - name: co_occurrence_count
        description: "Number of times both products were bought together"
        config:
          meta:
            metrics:
              sum_co_occurrence:
                type: sum
                sql: "${co_occurrence_count}"
              avg_co_occurrence:
