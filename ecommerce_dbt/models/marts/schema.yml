version: 2

models:
  - name: mart_c360_table
    description: "Master table combining segments, events, and LTV predictions per user."
    columns:
      - name: user_id
        description: "Unique identifier for the customer"
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              total_customers:
                label: "Total Customers"
                type: count_distinct
                sql: "${user_id}"

      - name: recency
        description: "Days since last purchase"
        config:
          meta:
            dimension:
              label: "Recency (Days)"
              type: number
            metrics:
              avg_recency:
                label: "Average Recency"
                type: average
                sql: "${recency}"

      - name: frequency
        description: "Total number of orders"
        config:
          meta:
            dimension:
              label: "Order Frequency"
              type: number
            metrics:
              avg_frequency:
                label: "Average Frequency"
                type: average
                sql: "${frequency}"

      - name: monetary
        description: "Total historical spend"
        config:
          meta:
            metrics:
              total_revenue:
                label: "Total Historical Revenue"
                type: sum
                sql: "${monetary}"
              avg_revenue:
                label: "Avg Revenue per Customer"
                type: average
                sql: "${monetary}"

      - name: recency_score
        description: "RFM score for recency (1-5)"
        config:
          meta:
            dimension:
              label: "Recency Score"
              type: number

      - name: frequency_score
        description: "RFM score for frequency (1-5)"
        config:
          meta:
            dimension:
              label: "Frequency Score"
              type: number

      - name: monetary_score
        description: "RFM score for monetary (1-5)"
        config:
          meta:
            dimension:
              label: "Monetary Score"
              type: number

      - name: segment
        description: "Customer segment based on RFM"
        config:
          meta:
            dimension:
              label: "Customer Segment"
              type: string
              colors:
                'At-Risk Repeat Customer': "#5470c6"
                'Dormant High-Value Customer': "#fc8452"
                'General Potential Customer': "#91cc75"
                'Recent New Customer': "#fac858"
                'VVIP Loyal High-Value Customer': "#ee6666"

      - name: compound_score
        description: "Average sentiment score of customer reviews"
        config:
          meta:
            dimension:
              label: "Sentiment Score"
              type: number
            metrics:
              avg_sentiment_score:
                label: "Average Sentiment Score"
                type: average
                sql: "${compound_score}"

      - name: risk_flag
        description: "Flag indicating customer churn risk (1 = at risk, 0 = not at risk)"
        config:
          meta:
            dimension:
              label: "Churn Risk Flag"
              type: number
            metrics:
              at_risk_customers:
                label: "At-risk Sentiment Customers"
                type: count_distinct
                sql: "CASE WHEN ${risk_flag} = 1 THEN ${user_id} END"
              sentiment_risk_rate:
                label: "Sentiment Risk Rate"
                type: number
                sql: "${at_risk_customers} / NULLIF(${total_customers}, 0)"
                format: "percent"

      - name: city
        description: "City of the user"
        config:
          meta:
            dimension:
              label: "City"
              type: string

      - name: gender
        description: "Gender of the user"
        config:
          meta:
            dimension:
              label: "Gender"
              type: string

      - name: signup_date
        description: "Date the user signed up"
        config:
          meta:
            dimension:
              label: "Signup Date"
              type: date
              time_intervals: ["DAY", "WEEK", "MONTH", "YEAR"]

      - name: total_views
        description: "Total product page views"
        config:
          meta:
            metrics:
              sum_total_views:
                type: sum
                sql: "${total_views}"

      - name: total_cart_adds
        description: "Total add-to-cart events"
        config:
          meta:
            metrics:
              sum_total_cart_adds:
                type: sum
                sql: "${total_cart_adds}"

      - name: predicted_profit_90_days
        description: "ML predicted profit for next 90 days"
        config:
          meta:
            metrics:
              avg_predicted_ltv:
                type: average
                sql: "${predicted_profit_90_days}"

      - name: prob_minmax
        description: "MinMax scaled score of predicted profit"
        config:
          meta:
            dimension:
              label: "LTV Probability Score"
              type: number

      - name: automation_trigger
        description: "Recommended automation action for marketing"
        config:
          meta:
            dimension:
              label: "Automation Trigger"
              type: string

  - name: mart_edm_suggestions
    description: "Top categories for EDM targeting based on dormant high-value customers."
    columns:
      - name: category
        description: "Product category recommended"
        config:
          meta:
            dimension:
              label: "Product Category"
              type: string

      - name: total_quantity
        description: "Total quantity of products sold in this category"
        config:
          meta:
            metrics:
              sum_total_quantity:
                type: sum
                sql: "${total_quantity}"

  - name: mart_product_health_report
    description: "Detailed report on product ratings, risk reviews, and pain points."
    columns:
      - name: product_id
        description: "Unique identifier for the product"
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              total_products:
                type: count_distinct
                sql: "${product_id}"

      - name: product_name
        description: "Name of the product"
        config:
          meta:
            dimension:
              label: "Product Name"
              type: string

      - name: category
        description: "Product category"
        config:
          meta:
            dimension:
              label: "Category"
              type: string

      - name: brand
        description: "Product brand"
        config:
          meta:
            dimension:
              label: "Brand"
              type: string

      - name: price
        description: "Product price"
        config:
          meta:
            dimension:
              label: "Price"
              type: number
            metrics:
              avg_price:
                type: average
                sql: "${price}"

      - name: avg_rating_overall
        description: "Overall average rating"
        config:
          meta:
            metrics:
              avg_rating:
                type: average
                sql: "${avg_rating_overall}"

      - name: rating_30d
        description: "Average rating in the last 30 days"
        config:
          meta:
            dimension:
              label: "Rating (30d)"
              type: number

      - name: rating_45d
        description: "Average rating in the last 45 days"
        config:
          meta:
            dimension:
              label: "Rating (45d)"
              type: number

      - name: rating_60d
        description: "Average rating in the last 60 days"
        config:
          meta:
            dimension:
              label: "Rating (60d)"
              type: number

      - name: total_risk_reviews
        description: "Total number of negative/risk reviews"
        config:
          meta:
            metrics:
              sum_risk_reviews:
                type: sum
                sql: "${total_risk_reviews}"

      - name: top_pain_points
        description: "Most frequent complaints or issues mentioned in reviews"
        config:
          meta:
            dimension:
              label: "Top Pain Points"
              type: string

  - name: mart_sleepy_product_health
    description: "Health of products frequently bought by dormant customers."
    columns:
      - name: product_id
        description: "Product identifier"
        config:
          meta:
            metrics:
