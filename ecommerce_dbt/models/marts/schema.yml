  - name: mart_product_affinity
    description: "Market basket analysis showing co-occurrence count and affinity metrics."
    columns:
      - name: affinity_level
        description: "Granularity of affinity (e.g., product)"
        config:
          meta:
            dimension:
              label: "Affinity Level"
              type: string

      - name: product_a_id
        description: "ID of the first product"
        config:
          meta:
            dimension:
              label: "Product A ID"
              type: string

      - name: product_a_name
        description: "Name of the first product"
        config:
          meta:
            dimension:
