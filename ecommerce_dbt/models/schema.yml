version: 2

sources:
  - name: raw_ecommerce
    schema: raw_ecommerce
    tables:
      - name: raw_orders
      - name: raw_order_items
      - name: raw_products
      - name: raw_events
      - name: raw_reviews
      - name: raw_users
      - name: review_sentiment_scores

  - name: external_intermediate
    description: "Tables generated by external Python scripts but treated as intermediate models."
    database: my-project-for-bigquery-445809
    schema: dbt_ecommerce_intermediate
    tables:
      - name: int_review_sentiment_user
        description: "User-level sentiment aggregates."
        columns:
          - name: user_id
            data_type: STRING
            tests:
              - not_null
              - unique
      - name: int_review_sentiment_detail
        description: "Detail-level sentiment scores per review."
        columns:
          - name: review_id
            data_type: STRING
            tests:
              - not_null
              - unique
      - name: int_ltv_predictions
        description: "Predicted LTV per user from BQML."
        columns:
          - name: user_id
            data_type: STRING
            tests:
              - not_null
              - unique
